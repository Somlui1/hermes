version: '3.8'

services:
  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: hermes
    restart: unless-stopped
    command: gateway run
    ports:
      - "8642:8642"
      - "9119:9119"
    volumes:
      - ./.hermes:/opt/data
    shm_size: '1gb'
    env_file:
      - .hermes/.env

  # --- เพิ่มส่วนของ Ngrok ตรงนี้ ---
  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok_tunnel
    restart: unless-stopped
    command:
      - "http"
      - "hermes:8642" # มุดท่อไปหา service ชื่อ hermes ที่พอร์ต 8642 โดยตรง
    env_file:
      - .hermes/.env
    depends_on:
      - hermes
